<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Club</title>
  <link rel="icon" type="image/x-icon" href="/bookclub/favicon.ico">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">📖 Book Club</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="books.html">Books</a>
      <a href="stats.html">Stats</a>
    </div>
  </nav>

  <main>
    <section id="next-meeting">
      <h1 id="meeting-heading" class="loading">Loading…</h1>
      <p id="meeting-book" class="loading"></p>
      <p id="meeting-meta" class="meeting-meta"></p>
    </section>

    <section id="book-summary">
      <h2>About This Book</h2>
      <div class="book-card-hero">
        <img class="book-cover-hero" id="book-cover" src="" alt="Book cover" />
        <div>
          <div id="book-tags"></div>
          <p id="book-description" class="loading">Loading book details…</p>
          <p id="book-publishmeta" class="book-meta-text"></p>
          <a class="btn" id="goodreads-link" href="#" target="_blank" rel="noopener">View on Goodreads</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Book Club</p>
  </footer>

  <script>
    // ─── ONLY EDIT THIS SECTION EACH MONTH ──────────────────
    var NEXT_MEETING = {
      date:     'April 15, 2026',
      host:     'Tessa',
      location: "Tessa's house"
    };
    // ─────────────────────────────────────────────────────────

    var CSV_URL = 'https://raw.githubusercontent.com/kellybearclawz/bookclub/main/Book%20Club%20-%20Books%20Read_ISBN.csv';

    function parseCSV(text) {
      var lines = text.trim().split('\n').filter(function(l) { return l.trim(); });
      var headers = splitCSVRow(lines[0]);
      return lines.slice(1).map(function(line) {
        var vals = splitCSVRow(line);
        var obj = {};
        headers.forEach(function(h, i) { obj[h.trim()] = (vals[i] || '').trim(); });
        return obj;
      });
    }

    function splitCSVRow(row) {
      var result = [], cur = '', inQuotes = false;
      for (var i = 0; i < row.length; i++) {
        var ch = row[i];
        if (ch === '"') {
          if (inQuotes && row[i+1] === '"') { cur += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(cur); cur = '';
        } else { cur += ch; }
      }
      result.push(cur);
      return result;
    }

    // Cover via Google Dynamic Links
    function fetchCoverByISBN(isbn) {
      return new Promise(function(resolve) {
        var cbName = '__gbcb_' + Date.now();
        var timeout = setTimeout(function() { delete window[cbName]; resolve(null); }, 5000);
        window[cbName] = function(data) {
          clearTimeout(timeout);
          var key = 'ISBN:' + isbn;
          var url = (data[key] && data[key].thumbnail_url)
            ? data[key].thumbnail_url.replace('http://', 'https://')
            : null;
          delete window[cbName];
          resolve(url);
        };
        var script = document.createElement('script');
        script.src = 'https://books.google.com/books?bibkeys=ISBN:' + isbn + '&jscmd=viewapi&callback=' + cbName;
        script.onerror = function() { clearTimeout(timeout); resolve(null); };
        document.head.appendChild(script);
      });
    }

    // Description via Google Books REST API
    function fetchBookInfo(isbn) {
      return fetch('https://www.googleapis.com/books/v1/volumes?q=isbn:' + isbn + '&maxResults=1')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.items && data.items.length) return data.items[0].volumeInfo || null;
          return null;
        })
        .catch(function() { return null; });
    }

    async function init() {
      // Set meeting info immediately
      document.getElementById('meeting-heading').textContent = 'Next Meeting: ' + NEXT_MEETING.date;
      document.getElementById('meeting-heading').classList.remove('loading');

      // Load CSV
      var text, rows, book;
      try {
        var res = await fetch(CSV_URL);
        text = await res.text();
        rows = parseCSV(text);
        book = rows[rows.length - 1];
      } catch(e) {
        document.getElementById('meeting-book').textContent = 'Could not load book data.';
        return;
      }

      var isbn         = book['ISBN'] || '';
      var title        = book['Title'] || 'Unknown Title';
      var author       = book['Author'] || '';
      var genre        = book['Genre'] || '';
      var subgenre     = book['Sub-Genre'] || '';
      var goodreadsUrl = book['Goodreads URL'] || ('https://www.goodreads.com/book/isbn/' + isbn);

      document.getElementById('meeting-book').innerHTML = 'Current Book: <em>' + title + '</em> by ' + author;
      document.getElementById('meeting-book').classList.remove('loading');

      var metaParts = [];
      if (NEXT_MEETING.host)     metaParts.push('Hosted by ' + NEXT_MEETING.host);
      if (NEXT_MEETING.location) metaParts.push(NEXT_MEETING.location);
      document.getElementById('meeting-meta').textContent = metaParts.join(' · ');

      [genre, subgenre].filter(Boolean).forEach(function(t) {
        var span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        document.getElementById('book-tags').appendChild(span);
      });

      document.getElementById('goodreads-link').href = goodreadsUrl;

      if (isbn) {
        // Fetch cover and description in parallel
        var results = await Promise.all([fetchCoverByISBN(isbn), fetchBookInfo(isbn)]);
        var coverUrl = results[0];
        var gbData   = results[1];

        var coverEl = document.getElementById('book-cover');
        if (coverUrl) {
          coverEl.src = coverUrl;
        } else if (gbData && gbData.imageLinks) {
          coverEl.src = (gbData.imageLinks.thumbnail || gbData.imageLinks.smallThumbnail || '').replace('http://', 'https://');
        }
        coverEl.alt = title;

        if (gbData && gbData.publishedDate) {
          var pub = gbData.publisher ? ' · ' + gbData.publisher : '';
          document.getElementById('book-publishmeta').textContent = 'Published ' + gbData.publishedDate + pub;
        }

        var descEl = document.getElementById('book-description');
        descEl.textContent = (gbData && gbData.description)
          ? gbData.description
          : 'No description available. View on Goodreads for more details.';
        descEl.classList.remove('loading');
      } else {
        document.getElementById('book-description').textContent = 'No ISBN on file.';
        document.getElementById('book-description').classList.remove('loading');
      }
    }

    init();
  </script>
</body>
</html>
